<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Boss Crystal Price Tracker - Multi Character v2</title>
    <!-- Version 2.0 - Refactored with External Resources -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional inline styles can be added here if needed */

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #e8e8e8;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #f0f0f0;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            color: #e0e0e0;
        }

        .main-content {
            padding: 30px;
        }

        .character-section {
            margin-bottom: 30px;
        }

        .character-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-character-btn, .save-btn, .export-btn, .import-btn, .copy-character-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #f0f0f0;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .add-character-btn:hover, .save-btn:hover, .export-btn:hover, .import-btn:hover, .copy-character-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .copy-character-btn {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .save-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .export-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .import-btn {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        }

        .save-status {
            display: inline-block;
            padding: 12px 24px;
            background: #d4edda;
            color: #155724;
            border-radius: 8px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .save-status.show {
            opacity: 1;
        }

        #importFileInput {
            display: none;
        }

        .character-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .character-tab {
            background: #0f3460;
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e0e0e0;
        }

        .character-tab:hover {
            border-color: #667eea;
        }

        .character-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #f0f0f0;
            border-color: #667eea;
        }

        .character-tab-name {
            font-weight: 600;
        }

        .character-tab-total {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .delete-character-btn {
            background: #ff4757;
            color: #f0f0f0;
            border: none;
            border-radius: 5px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.85em;
            margin-left: 5px;
        }

        .delete-character-btn:hover {
            background: #ff3838;
        }

        .character-tab.active .delete-character-btn {
            background: rgba(255, 255, 255, 0.3);
        }

        .character-tab.active .delete-character-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .boss-list {
            background: #0f3460;
            border-radius: 10px;
            padding: 12px;
            max-height: 700px;
            overflow-y: auto;
        }

        .boss-list h2 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .boss-item {
            background: #16213e;
            border: 2px solid #1a1a2e;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e0e0e0;
        }

        .boss-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .boss-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #f0f0f0;
            border-color: #667eea;
        }

        .boss-name {
            font-weight: 600;
            font-size: 0.95em;
        }

        .boss-price {
            font-weight: bold;
            font-size: 1em;
            color: #e94560;
        }

        .boss-item.selected .boss-price {
            color: #f0f0f0;
        }

        .summary {
            background: #0f3460;
            border-radius: 10px;
            padding: 20px;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .summary h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .character-name-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
            background: #16213e;
            color: #e0e0e0;
        }

        .character-name-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .selected-bosses {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .selected-boss {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #1a1a2e;
        }

        .selected-boss:last-child {
            border-bottom: none;
        }

        .selected-boss-name {
            font-size: 0.95em;
            color: #e0e0e0;
        }

        .selected-boss-price {
            font-weight: bold;
            color: #e94560;
        }

        .selected-boss.not-counted {
            opacity: 0.5;
        }

        .selected-boss.not-counted .selected-boss-name {
            text-decoration: line-through;
            color: #666;
        }

        .selected-boss.not-counted .selected-boss-price {
            color: #666;
        }

        .remove-btn {
            background: #ff4757;
            color: #f0f0f0;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.85em;
            margin-left: 10px;
            transition: background 0.3s ease;
        }

        .remove-btn:hover {
            background: #ff3838;
        }

        .total-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #f0f0f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .total-label {
            font-size: 1.2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .total-amount {
            font-size: 2.5em;
            font-weight: bold;
        }

        .grand-total-section {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #f0f0f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .clear-btn {
            background: #e94560;
            color: #f0f0f0;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .clear-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
            background: #d63447;
        }

        .empty-message {
            text-align: center;
            color: #666;
            padding: 20px;
            font-style: italic;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
            background: #16213e;
            color: #e0e0e0;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .no-character-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }

        .boss-limit-warning {
            background: #2c1810;
            border: 2px solid #e94560;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            color: #ffb347;
            font-size: 0.95em;
            text-align: center;
        }

        .boss-limit-warning strong {
            color: #e94560;
        }

        .overflow-tooltip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #16213e;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            color: #e0e0e0;
        }

        .overflow-tooltip-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .overflow-tooltip h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .overflow-boss-item {
            background: #0f3460;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
        }

        .overflow-boss-name {
            color: #f0f0f0;
            font-weight: 600;
            font-size: 1em;
        }

        .overflow-boss-details {
            color: #999;
            font-size: 0.9em;
            margin-top: 4px;
        }

        .overflow-close-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
        }

        .overflow-close-btn:hover {
            background: #5568d3;
        }

        .overflow-tip {
            background: #2c1810;
            border-left: 3px solid #e94560;
            padding: 10px;
            margin-top: 15px;
            border-radius: 4px;
            color: #ffb347;
            font-size: 0.9em;
        }

        .main-tabs {
            display: flex;
            gap: 10px;
            padding: 20px 30px 0 30px;
            background: #16213e;
        }

        .main-tab {
            background: #0f3460;
            color: #e0e0e0;
            border: none;
            border-radius: 8px 8px 0 0;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .main-tab:hover {
            background: #1a3a5c;
        }

        .main-tab.active {
            background: #16213e;
            color: #f0f0f0;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 MapleStory Tracker</h1>
            <p>Track your characters across multiple activities</p>
        </div>
        
        <div class="main-tabs">
            <button class="main-tab active" onclick="switchMainTab('bossCrystals')">💎 Boss Crystals</button>
            <button class="main-tab" onclick="switchMainTab('pitchTracker')">💀 Pitched Tracker</button>
            <button class="main-tab" onclick="switchMainTab('bhHistory')">🖤 BH History</button>
            <button class="main-tab" onclick="switchMainTab('sellingStrategy')">💰 Selling Strategy</button>
        </div>
        
        <div class="main-content">
            <!-- Boss Crystals Tab -->
            <div id="bossCrystalsTab" class="tab-content active">
                <div class="character-section">
                    <div class="character-controls">
                        <button class="add-character-btn" onclick="addCharacter()">+ Add Character</button>
                        <button class="copy-character-btn" onclick="copyCurrentCharacter()">📋 Copy Character</button>
                        <button class="copy-character-btn" onclick="reorganizeCharacters()">🔄 Reorganize</button>
                        <button class="save-btn" onclick="manualSave()">💾 Save</button>
                        <button class="export-btn" onclick="exportData()">📤 Export</button>
                        <button class="import-btn" onclick="document.getElementById('importFileInput').click()">📥 Import</button>
                        <span class="save-status" id="saveStatus">✓ Saved!</span>
                        <input type="file" id="importFileInput" accept=".json" onchange="importData(event)">
                    </div>
                    
                    <div class="character-tabs" id="characterTabs"></div>
                </div>

                <div id="mainContent"></div>
            </div>

            <!-- Pitch Tracker Tab -->
            <div id="pitchTrackerTab" class="tab-content">
                <div class="character-section">
                    <div class="character-controls">
                        <button class="add-character-btn" onclick="addCharacter()">+ Add Character</button>
                        <button class="copy-character-btn" onclick="copyCurrentCharacter()">📋 Copy Character</button>
                        <button class="save-btn" onclick="manualSave()">💾 Save</button>
                        <span class="save-status" id="saveStatus">✓ Saved!</span>
                    </div>
                    
                    <div class="character-tabs" id="pitchCharacterTabs"></div>
                </div>

                <div id="pitchContent">
                    <div style="padding: 40px; text-align: center; color: #999;">
                        <h2 style="color: #e94560; margin-bottom: 20px;">💀 Pitched Tracker</h2>
                        <p>Coming soon! This feature will help you track pitched-related activities.</p>
                    </div>
                </div>
            </div>

            <!-- BH History Tab -->
            <div id="bhHistoryTab" class="tab-content">
                <div id="bhHistoryContent"></div>
            </div>

            <!-- Selling Strategy Tab -->
            <div id="sellingStrategyTab" class="tab-content">
                <div id="sellingStrategyContent"></div>
            </div>
        </div>
    </div>

    <script src="boss-tracker.js"></script>
</body>
</html>
